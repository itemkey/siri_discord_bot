services:
  postgres:
    image: postgres:16-alpine
    container_name: siri-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-siri_discord_bot}
      POSTGRES_USER: ${POSTGRES_USER:-siri}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-siri_password_change_me}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  discord-bot:
    build: .
    container_name: siri-discord-bot
    restart: unless-stopped
    init: true
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://siri:siri_password_change_me@postgres:5432/siri_discord_bot}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres-data:
